name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.10]
    env:
      USE_SQLITE: '1'
      SQLITE_DB: './data.sqlite3'
      JWT_SECRET: 'ci-test-secret'
      REQUIRE_JWT_SECRET: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Migrate to SQLite
        run: python migrate_to_sqlite.py

      - name: Run tests
        run: python -m pytest -q

  orm-test:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: [3.11]
    env:
      DB_ENGINE: 'orm'
      USE_SQLALCHEMY: '1'
      SQLALCHEMY_DATABASE_URI: 'sqlite:///./data-orm.sqlite3'
      JWT_SECRET: 'ci-test-secret'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: |
          alembic upgrade head

      - name: Seed DB and run tests
        run: |
          python migrate_to_sqlite.py
          python -m pytest -q

  redis-test:
    runs-on: ubuntu-latest
    needs: test
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    strategy:
      matrix:
        python-version: [3.11]
    env:
      REDIS_URL: 'redis://localhost:6379/0'
      ALLOW_REDIS_FLUSH: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with Redis
        run: |
          python -m pytest tests/test_throttle_redis.py -q
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest -q
